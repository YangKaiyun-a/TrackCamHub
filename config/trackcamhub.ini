# TrackCamHub configuration.
# Lines are parsed as key=value. Unknown keys are ignored.

# Upper-computer Thrift server. The camera calls TaskInfoChanged on this port.
hub.uc_server_port=7080

# Lower-controller serial input.
# Set track.serial_enabled=true when the real rotation-base serial device is connected.
track.serial_enabled=false
track.port=COM7
track.baud_rate=115200
track.ready_command=0x00

# Local TCP trigger for camera-only debugging.
# Run trigger_capture.bat to trigger one capture without waiting for serial rotation success.
direct_trigger.enabled=true
direct_trigger.host=127.0.0.1
direct_trigger.port=7090

# Camera-side Thrift service.
camera.id=camera-1
camera.host=172.30.1.111
camera.port=7082
camera.heartbeat_interval_ms=1000
camera.heartbeat_fail_max=3
camera.capture_timeout_ms=15000
camera.poll_interval_ms=200

# Save result images and result.json when TaskInfoChanged reaches Finished.
camera.image_capture_enabled=true
